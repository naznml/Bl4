<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">

<title>Биология — 7 нұсқа</title>
<style>
*{box-sizing:border-box} body{margin:0;background:#f4f7fb;color:#172033;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;line-height:1.5}
.wrap{width:min(980px,calc(100% - 24px));margin:22px auto 50px}
.panel,.card,.result{background:#fff;border:1px solid #e1e7f0;border-radius:18px;box-shadow:0 7px 22px rgba(30,45,75,.07)}
.panel{padding:24px;margin-bottom:18px} h1{margin:0 0 7px;font-size:clamp(25px,5vw,38px)} .muted{color:#68758b;margin:0}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:20px}
.variant{padding:18px;text-align:left;background:#f8faff;border:1.5px solid #d9e2f2;border-radius:14px;cursor:pointer;font:inherit}
.variant strong{display:block;font-size:18px;color:#244eb8}.variant span{color:#68758b;font-size:14px}
.variant:hover{border-color:#315fda;background:#eef3ff}
.topbar{display:none;align-items:center;justify-content:space-between;gap:12px;margin-bottom:15px}
.back,.btn{border:0;border-radius:12px;padding:13px 17px;font:inherit;font-weight:700;cursor:pointer}
.back{background:#e9edf4;color:#263249}.btn{background:#315fda;color:#fff}.reset{background:#e9edf4;color:#263249}
.progressbox{flex:1}.track{height:9px;background:#e8edf5;border-radius:99px;overflow:hidden}.bar{height:100%;width:0;background:#315fda;transition:.2s}
.ptext{font-size:13px;color:#68758b;margin-top:5px}
.card{padding:21px;margin-bottom:14px}.num{display:inline-block;background:#eef3ff;color:#315fda;border-radius:99px;padding:5px 10px;font-weight:700;font-size:13px;margin-bottom:10px}
.q{font-size:18px;font-weight:750;margin:0 0 15px}.opts{display:grid;gap:9px}
.opt{display:flex;gap:10px;align-items:flex-start;padding:12px 13px;border:1.5px solid #dbe2ec;border-radius:12px;cursor:pointer}
.opt:hover{background:#f8faff;border-color:#91a9e4}.opt input{margin-top:4px;accent-color:#315fda}
.opt.sel{background:#eef3ff;border-color:#315fda}.opt.ok{background:#eaf8ef;border-color:#159447;color:#0c6a31}.opt.bad{background:#fff0f0;border-color:#d84646;color:#a32929}
.expl{display:none;margin-top:13px;padding:12px 13px;background:#f4f7ff;border-left:4px solid #315fda;border-radius:8px;color:#34415a}
.actions{display:none;gap:10px;flex-wrap:wrap;margin:20px 0}.result{display:none;padding:24px;text-align:center;margin-top:18px}.score{font-size:46px;font-weight:850;color:#315fda}
@media(max-width:620px){.grid{grid-template-columns:1fr}.panel,.card{padding:17px;border-radius:14px}.topbar{align-items:stretch;flex-direction:column}.actions .btn,.actions .reset{width:100%}}
</style>
</head>
<body>
<main class="wrap">
<section class="panel" id="home">

</section>

</div>

</main>
<script>
const variants=[[{"q": "Бидай өсімдігінің ұзаққа созылған модификациясын зерттеген ғалым?", "a": "ЗИЯРОВ М", "options": ["Ж.Б.Ламарк", "ЗИЯРОВ М", "К.Линней", "Г.Мендель", "Ч.Дарвин"], "answer": 1}, {"q": "Модификациялық өзгергіштік?", "a": "Тұқым қуаламайды", "options": ["фенотипті өзгертеді", "генотипті өзгертеді", "ортаға тәуелді", "Тұқым қуаламайды", "ұрпаққа берілмейді"], "answer": 3}, {"q": "Жылу тербелісі энергия әсерінен бейберекет қозғалуы?", "a": "Диффузия", "options": ["осмос", "броундық қозғалыс", "Диффузия", "фильтрация", "адсорбция"], "answer": 2}, {"q": "Бірінші реттік зәр түзілу?", "a": "Абсорбция", "options": ["Абсорбция", "қан плазмасы", "алғашқы фильтрат", "лимфа", "бірінші реттік зәр"], "answer": 0}, {"q": "Хлоропласт ішінде екі мембрана қатпарлы өсіп шығып тұратын кү рделі түзіліс?", "a": "Тилакоидттар", "options": ["строма", "грана", "Тилакоидттар", "ішкі мембрана", "тилакоид"], "answer": 2}, {"q": "Жарық түскен кезде хлоропласт жасушаларының қозғалысы?", "a": "фототаксис", "options": ["термотаксис", "геотаксис", "фототаксис", "реотаксис", "хемотаксис"], "answer": 2}, {"q": "Анаэробты тыныс алатын ағза?", "a": "аскарида", "options": ["сүтқышқылды бактерия", "ашытқы", "клостридий", "аскарида", "метаноген"], "answer": 3}, {"q": "Құстар мен сүтқоректілердің көптеген түрлері үстемдік еткен динозаврлар заманы?", "a": "мезозой", "options": ["кайнозой", "палеозой", "мезозой", "архей", "протерозой"], "answer": 2}, {"q": "Жынысты көбеюдің табиғатта кең таралған ерекше түрі?", "a": "ПАРТЕНОГЕНЕЗ", "options": ["спора түзу", "бүршіктену", "вегетативті көбею", "ПАРТЕНОГЕНЕЗ", "бөліну"], "answer": 3}, {"q": "АДФ те қанша фосфор қышқыл қалдығы болады?", "a": "", "options": ["5", "2", "4", "6", ""], "answer": 4}, {"q": "Бидай мен картоп түйнегінде болатын көмірсу?", "a": "Крахмал", "options": ["гликоген", "целлюлоза", "мальтоза", "Крахмал", "сахароза"], "answer": 3}, {"q": "Өздігінен қортылады?", "a": "лизосома", "options": ["Гольджи жиынтығы", "эндоплазмалық тор", "хлоропласт", "митохондрия", "лизосома"], "answer": 4}, {"q": "Жақсылап ұсақ қорек қарапайымдылар мен микробактерия арқылы бір жола қортатын асқазан бөлімі?", "a": "Қатпарлы", "options": ["месқарын", "ұлтабар", "Қатпарлы", "жұмыршақ", "тақияқарын"], "answer": 2}, {"q": "Жүйелеуді алғаш ұсынған?", "a": "К.Линней", "options": ["Г.Мендель", "Ж.Б.Ламарк", "К.Линней", "Ч.Дарвин", "Т.Морган"], "answer": 2}, {"q": "Тыныс алуды өлшейтін құрал?", "a": "СПИРОМЕТР", "options": ["тонометр", "СПИРОМЕТР", "микроскоп", "калориметр", "осмометр"], "answer": 1}, {"q": "Әйелдердің өкпе сыйымдылығы?", "a": "мл", "options": ["5500 мл", "6500 мл", "мл", "3500 мл", "4500 мл"], "answer": 2}, {"q": "Сүт өндіретін өсімдіктің жасушасы?", "a": "сүтті өзектер", "options": ["безді түктер", "гидатодтар", "сүтті өзектер", "шайыр жолдары", "нектарийлер"], "answer": 2}, {"q": "Екі бүйрек жұмысын тоқтату уақыты?", "a": "-40 мин", "options": ["40-50 мин", "-40 мин", "30-40 мин", "50-60 мин", "10-20 мин"], "answer": 1}, {"q": "Сүйек зақымданған соң қалпына келтіретін сүйек жасушасы?", "a": "остеобластар", "options": ["хондробластар", "остеоциттер", "остеобластар", "фибробластар", "хондроциттер"], "answer": 2}, {"q": "Жалпақ құрттардың асқорыту жүйелерінің жойылып қарапайымдануы?", "a": "дегенерация", "options": ["биологиялық прогресс", "биологиялық регресс", "ароморфоз", "дегенерация", "идиоадаптация"], "answer": 3}], [{"q": "Генетикалық манипуляция жасауда өсімдік жасушасына қолданылады?", "a": "бактерия", "options": ["протист", "саңырауқұлақ", "архея", "вирус", "бактерия"], "answer": 4}, {"q": "Қ ан  тазартуға қатысатын мүше?", "a": "бауыр", "options": ["бауыр", "бүйрек", "өкпе", "жүрек", "көкбауыр"], "answer": 0}, {"q": "Макроэргиялық байланыс?", "a": "АТФ", "options": ["НАДФ", "АДФ", "АМФ", "АТФ", "ГТФ"], "answer": 3}, {"q": "Сыртқы құлақтың қызметі?", "a": "Дыбыс тербелістерін ішке бағыттау", "options": ["қысымды теңестіру", "Дыбыс тербелістерін ішке бағыттау", "дыбысты күшейту", "тепе-теңдікті сақтау", "дыбыс толқынын түрлендіру"], "answer": 1}, {"q": "Эволюцияның ең кішкентай бірлігі?", "a": "түр", "options": ["түр", "популяция", "тұқымдас", "туыс", "дара"], "answer": 0}, {"q": "Нәруыздың екінші реттік құрылымы?", "a": "СУТЕКТІК", "options": ["гликозидтік", "3 сутектік", "пептидтік", "2 сутектік", "СУТЕКТІК"], "answer": 4}, {"q": "Бір қабатты эпителий ұлпасының қызметі?", "a": "ішекте заттарды сіңіру", "options": ["қорғаныш қызметін атқару", "заттарды секрециялау", "ішекте заттарды сіңіру", "газ алмасуды қамтамасыз ету", "сүзуді қамтамасыз ету"], "answer": 2}, {"q": "Су ыдырағанда фотосинтездің жарық кезеңіде бөлінеді?", "a": "оттек пен сутек", "options": ["лигнин", "суберин", "хитин", "оттек пен сутек", "целлюлоза"], "answer": 3}, {"q": "Жасушасыз тіршілік?", "a": "вирустар", "options": ["бактериялар", "археялар", "вирустар", "саңырауқұлақтар", "протистер"], "answer": 2}, {"q": "Бактериялық тыныс алу ауруы?", "a": "туберкуле з", "options": ["туберкуле з", "полиомиелит", "қант диабеті", "дальтонизм", "анемия"], "answer": 0}, {"q": "Гуанин бөлетін жануар?", "a": "өрмекшітәрізділер", "options": ["бауырымен жорғалаушылар", "шаянтәрізділер", "өрмекшітәрізділер", "қосмекенділер", "бунақденелілер"], "answer": 2}, {"q": "3 триплет?", "a": "антикодон", "options": ["антикодон", "интрон", "экзон", "промотор", "кодон"], "answer": 0}, {"q": "Жасыл өсімдіктерде фотосинтез процесі жүретін органоид?", "a": "хлоропласт", "options": ["хлоропласт", "рибосома", "ядро", "Гольджи жиынтығы", "эндоплазмалық тор"], "answer": 0}, {"q": "Бактерицидтік қасиеті бар, крахмалды моносахаридке айналдырады?", "a": "сілекей", "options": ["ұйқыбез сөлі", "асқазан сөлі", "өт", "ішек сөлі", "сілекей"], "answer": 4}, {"q": "Полипептидттік тізбегі бар сызықты бойлай немесе бүрмелеу арқылы байланысқан нәруыз?", "a": "Фибриалды", "options": ["құрылымдық", "мембраналық", "глобулярлы", "фибриллярлы", "Фибриалды"], "answer": 4}, {"q": "Аллостериялық қасиетке ие төрт реттік нәруыз?", "a": "Фосф let current=-1,locked=false;
const home=document.getElementById('home'),grid=document.getElementById('variantGrid'),quiz=document.getElementById('quiz'),topbar=document.getElementById('topbar'),actions=document.getElementById('actions'),result=document.getElementById('result');

variants.forEach((v,i)=>{

 b.innerHTML=`<strong>${i+1}-нұсқа</strong><span>20 сұрақ</span>`;
 b.onclick=()=>openVariant(i); grid.appendChild(b);
});
function openVariant(i){current=i;locked=false;home.style.display='none';topbar.style.display='flex';actions.style.display='flex';result.style.display='none';render();window.scrollTo(0,0)}
function render(){

 variants[current].forEach((x,qi)=>{
  const c=document.createElement('article');c.className='card';c.dataset.q=qi;
  c.innerHTML=`<div class="num">${qi+1}-сұрақ</div><div class="q">${x.q}</div><div class="opts">${x.options.map((o,oi)=>`<label class="opt"><input type="radio" name="q${qi}" value="${oi}"><span>${o}</span></label>`).join('')}</div><div class="expl"><b>Дұрыс жауап:</b> ${x.a}</div>`;
  quiz.appendChild(c);
 });
 document.querySelectorAll('input[type=radio]').forEach(r=>r.onchange=e=>{if(locked)return;const c=e.target.closest('.card');c.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));e.target.closest('.opt').classList.add('sel');progress()});
 progress();
}
function progress(){
 let n=variants[current].filter((_,i)=>document.querySelector(`input[name=q${i}]:checked`)).length;
 document.getElementById('bar').style.width=(n/20*100)+'%';document.getElementById('ptext').textContent=`Жауап берілді: ${n} / 20`;

function check(){

 variants[current].forEach((x,qi)=>{
  const c=document.querySelector(`[data-q="${qi}"]`),sel=c.querySelector(`input[name=q${qi}]:checked`);
  c.querySelectorAll('.opt').forEach((l,oi)=>{l.classList.remove('sel');l.querySelector('input').disabled=true;if(oi===x.answer)l.classList.add('ok');if(sel&&+sel.value===oi&&oi!==x.answer)l.classList.add('bad')});

}
function restart(){locked=false;result.style.display='none';render();window.scrollTo({top:0,behavior:'smooth'})}
